# Default nginx config baked into the dashboard image so it runs standalone
# (docker compose) with no external config. In Kubernetes the Helm chart mounts
# its own default.conf over this one (pointing /graphql at the backend Service).
server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Don't advertise the nginx version on errors/headers.
    server_tokens off;

    # Sensible baseline security headers for the SPA shell.
    add_header X-Content-Type-Options nosniff       always;
    add_header X-Frame-Options        DENY          always;
    add_header Referrer-Policy        same-origin    always;

    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # GraphQL BFF + downloadable exports — proxied so the SPA stays same-origin.
    # `backend` is the compose service name; Helm overrides this whole file.
    location /graphql {
        proxy_pass         http://backend:8080/graphql;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location /export/ {
        proxy_pass         http://backend:8080/export/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
    # Triage/suppression REST board (GET list, POST suppress, DELETE un-suppress).
    location /suppressions {
        proxy_pass         http://backend:8080/suppressions;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    # Remediation ticketing REST board.
    location /tickets {
        proxy_pass         http://backend:8080/tickets;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    # Red-team / BAS validation REST board.
    location /validations {
        proxy_pass         http://backend:8080/validations;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Hashed static assets are immutable — cache them hard.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # SPA routing: every unknown path falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Dependabot keeps dependencies patched across the three ecosystems this repo
# uses. Grouped, weekly PRs so the review load stays low. See:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Go backend
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # React dashboard
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used in CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"

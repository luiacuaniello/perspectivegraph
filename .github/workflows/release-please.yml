# Release automation. On every push to main, release-please reads the
# Conventional Commits since the last release and maintains a "release PR" that
# bumps the version + updates CHANGELOG.md. Merging that PR tags the release and
# creates the GitHub Release - no manual tagging after v0.2.0.
name: release-please

on:
  push:
    branches: [main]

# No ambient permissions: a job gets exactly what it needs and nothing else, so a
# compromised action in one step cannot reach the token rights of another. This
# mirrors publish-images.yml, which already starts from nothing.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release commit and tag
      pull-requests: write # open and update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a release is actually cut, build + push + sign + SBOM + provenance the
  # images. Runs in the same workflow (not a separate `on: release`) so it fires
  # even though release-please creates the release with the default GITHUB_TOKEN.
  publish-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/publish-images.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit

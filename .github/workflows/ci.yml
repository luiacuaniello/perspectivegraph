name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      # Supply-chain gate: fail on a vulnerability the code actually reaches.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      # SAST gate: static security analysis of the tool's OWN source - a security
      # tool should hold itself to the bar it sets. The by-design benign hits
      # (G404 Monte-Carlo PRNG, G401/G505 sha1 as a non-crypto content fingerprint,
      # G304 operator-configured paths) now each carry a justified `// #nosec` at the
      # call site, so a plain `gosec ./...` is clean and NEW unjustified uses still
      # fail. Only G104 (unchecked cleanup Close() errors) stays globally excluded.
      - name: gosec (SAST)
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest -quiet -exclude=G104 ./...

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      # Catches an API token / private key accidentally committed - table stakes
      # for a repo whose whole job is finding exposures. Free for public repos &
      # personal accounts; orgs set GITLEAKS_LICENSE.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  age-integration:
    name: AGE store integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      CGO_ENABLED: "0"
      # Exercises the real, hand-written Cypher path (injection-sensitive) that
      # unit tests with the in-memory store can't cover.
      PERSPECTIVE_TEST_POSTGRES_DSN: "host=localhost port=5432 user=perspective password=perspective dbname=perspectivegraph sslmode=disable"
    services:
      postgres:
        image: apache/age:release_PG16_1.6.0@sha256:16aa423d20a31aed36a3313244bf7aa00731325862f20ed584510e381f2feaed
        env:
          POSTGRES_USER: perspective
          POSTGRES_PASSWORD: perspective
          POSTGRES_DB: perspectivegraph
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U perspective -d perspectivegraph"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25.12"
          cache-dependency-path: backend/go.sum
      # The contract test creates the AGE extension + graph itself; just run it.
      - name: Run AGE store contract test
        run: go test -run TestAGEStoreContract -v ./internal/graph/...
      # Leader election's mutual-exclusion / failover needs a real Postgres
      # advisory lock; run it against the same service DB.
      - name: Run leader-election integration test
        run: go test -run TestAdvisoryLockMutualExclusion -v ./internal/leader/...

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # `npm install` (not `npm ci`): the lockfile pins platform-specific native
      # deps (rolldown/esbuild), and a lock generated on a different OS lacks this
      # runner's variants - `npm ci` would fail on a known npm bug (npm/cli#4828).
      - run: npm install --no-audit --no-fund
      - name: Lint (ESLint)
        run: npm run lint
      - run: npm run build
      - name: Unit tests (Vitest)
        run: npm test
      # Supply-chain gate: fail on a high/critical advisory in the JS deps.
      - name: npm audit
        run: npm audit --audit-level=high

  images:
    name: Container images (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build images
        run: |
          docker build -t perspectivegraph-backend:ci backend
          docker build -t perspectivegraph-dashboard:ci frontend
      # Installed from a SHA-pinned action rather than curling an install script off
      # a moving branch and piping it to a shell. The old form re-fetched whatever
      # `main` happened to contain at that moment and executed it in CI: a scanner
      # this repo trusts to gate its own releases was also the one dependency it
      # pulled unpinned. Everything else here is pinned; this now matches.
      - uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      # Fail on fixable HIGH/CRITICAL in the image layers (unfixable OS CVEs
      # don't block - there's nothing to do about them until a base rebuild).
      - name: Scan images
        run: |
          for img in perspectivegraph-backend:ci perspectivegraph-dashboard:ci; do
            trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 "$img"
          done

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegisgraph.backendHost" . }}
  labels:
    {{- include "aegisgraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: aegisgraph
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: api
              containerPort: {{ .Values.service.apiPort }}
            - name: ingest
              containerPort: {{ .Values.service.ingestPort }}
          envFrom:
            - configMapRef:
                name: {{ include "aegisgraph.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgraph.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgraph.fullname" . }}-secrets
                  key: GITHUB_TOKEN
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegisgraph.fullname" . }}-secrets
                  key: GITLAB_TOKEN
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegisgraph.backendHost" . }}
  labels:
    {{- include "aegisgraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
    - name: ingest
      port: {{ .Values.service.ingestPort }}
      targetPort: ingest

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "perspectivegraph.fullname" . }}
  labels:
    {{- include "perspectivegraph.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  # TLS termination at the ingress. Provide a cert in `secretName` (e.g. issued by
  # cert-manager via an annotation in ingress.annotations), or set ingress.tls.host
  # to override the host the cert covers.
  tls:
    - hosts:
        - {{ .Values.ingress.tls.host | default .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Ingestion webhooks (CI posts scanner output here).
          - path: /ingest
            pathType: Prefix
            backend:
              service:
                name: {{ include "perspectivegraph.backendHost" . }}
                port:
                  number: {{ .Values.service.ingestPort }}
          # GraphQL API.
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: {{ include "perspectivegraph.backendHost" . }}
                port:
                  number: {{ .Values.service.apiPort }}
          {{- if .Values.frontend.enabled }}
          # Dashboard (catch-all).
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "perspectivegraph.fullname" . }}-frontend
                port:
                  number: {{ .Values.service.frontendPort }}
          {{- end }}
{{- end }}

{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "perspectivegraph.fullname" . }}-frontend-nginx
  labels:
    {{- include "perspectivegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /graphql {
        proxy_pass http://{{ include "perspectivegraph.backendHost" . }}:{{ .Values.service.apiPort }}/graphql;
        proxy_set_header Host $host;
      }
      location /export/ {
        proxy_pass http://{{ include "perspectivegraph.backendHost" . }}:{{ .Values.service.apiPort }}/export/;
        proxy_set_header Host $host;
      }
      location /suppressions {
        proxy_pass http://{{ include "perspectivegraph.backendHost" . }}:{{ .Values.service.apiPort }}/suppressions;
        proxy_set_header Host $host;
      }
      location /tickets {
        proxy_pass http://{{ include "perspectivegraph.backendHost" . }}:{{ .Values.service.apiPort }}/tickets;
        proxy_set_header Host $host;
      }
      location /validations {
        proxy_pass http://{{ include "perspectivegraph.backendHost" . }}:{{ .Values.service.apiPort }}/validations;
        proxy_set_header Host $host;
      }
      location / {
        try_files $uri $uri/ /index.html;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perspectivegraph.fullname" . }}-frontend
  labels:
    {{- include "perspectivegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "perspectivegraph.fullname" . }}-frontend-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "perspectivegraph.fullname" . }}-frontend
  labels:
    {{- include "perspectivegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
  ports:
    - port: {{ .Values.service.frontendPort }}
      targetPort: 80
{{- end }}

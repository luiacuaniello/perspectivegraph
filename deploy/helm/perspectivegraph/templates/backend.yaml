{{- if and .Values.persistence.enabled (gt (int .Values.backend.replicas) 1) -}}
{{- fail "persistence.enabled stores governance state (suppressions/tickets/validations/history/audit) on a single-writer ReadWriteOnce volume; set backend.replicas to 1 while it is on - multiple replicas would split-brain the stores and cannot co-mount an RWO PVC." -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "perspectivegraph.backendHost" . }}
  labels:
    {{- include "perspectivegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.podSecurityContext }}
      # fsGroup makes the persistence PVC writable by the nonroot backend (else the
      # first governance-state write fails); runAsNonRoot pins the distroless guarantee.
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.postgres.enabled .Values.nats.enabled }}
      # Wait for the bundled infra to accept TCP before the backend starts, so it
      # connects to Apache AGE on the first try instead of crash-looping on NATS or
      # silently falling back to the in-memory graph when Postgres is slow to boot.
      # (Only the bundled components are gated; external endpoints are assumed up.)
      initContainers:
        {{- if .Values.postgres.enabled }}
        - name: wait-for-postgres
          image: {{ .Values.backend.waitImage }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "perspectivegraph.postgresHost" . }} {{ include "perspectivegraph.postgresPort" . }}; do
                echo "waiting for postgres {{ include "perspectivegraph.postgresHost" . }}:{{ include "perspectivegraph.postgresPort" . }} …"; sleep 2;
              done
        {{- end }}
        {{- if .Values.nats.enabled }}
        - name: wait-for-nats
          image: {{ .Values.backend.waitImage }}
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "perspectivegraph.natsHost" . }} 4222; do
                echo "waiting for nats {{ include "perspectivegraph.natsHost" . }}:4222 …"; sleep 2;
              done
        {{- end }}
      {{- end }}
      containers:
        - name: perspectivegraph
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.apiPort }}
            - name: ingest
              containerPort: {{ .Values.service.ingestPort }}
          envFrom:
            - configMapRef:
                name: {{ include "perspectivegraph.fullname" . }}-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: GITHUB_TOKEN
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: GITLAB_TOKEN
            - name: API_TOKENS
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: API_TOKENS
            - name: INGEST_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: INGEST_HMAC_SECRET
            - name: INGEST_HMAC_SECRETS
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: INGEST_HMAC_SECRETS
            - name: TICKET_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: TICKET_WEBHOOK_URL
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: ANTHROPIC_API_KEY
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: HF_TOKEN
            - name: STORE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: STORE_ENCRYPTION_KEY
            - name: EXPORT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "perspectivegraph.secretName" . }}
                  key: EXPORT_SIGNING_KEY
            {{- if .Values.backend.tls.enabled }}
            # In-pod TLS: the cert/key are mounted from backend.tls.secretName below.
            - name: TLS_CERT_FILE
              value: /etc/perspectivegraph/tls/tls.crt
            - name: TLS_KEY_FILE
              value: /etc/perspectivegraph/tls/tls.key
            {{- end }}
            {{- if .Values.nats.tls.enabled }}
            # NATS TLS: CA (server-auth) + client cert (mutual TLS) from nats.tls.secretName.
            - name: NATS_TLS_CA
              value: /etc/perspectivegraph/nats-tls/ca.crt
            - name: NATS_TLS_CERT
              value: /etc/perspectivegraph/nats-tls/tls.crt
            - name: NATS_TLS_KEY
              value: /etc/perspectivegraph/nats-tls/tls.key
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: api
              {{- if .Values.backend.tls.enabled }}
              scheme: HTTPS
              {{- end }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            # Writable scratch for the read-only rootfs (mirrors compose tmpfs:/tmp).
            - name: tmp
              mountPath: /tmp
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.backend.tls.enabled }}
            - name: tls
              mountPath: /etc/perspectivegraph/tls
              readOnly: true
            {{- end }}
            {{- if .Values.nats.tls.enabled }}
            - name: nats-tls
              mountPath: /etc/perspectivegraph/nats-tls
              readOnly: true
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "perspectivegraph.fullname" . }}-data
        {{- end }}
        {{- if .Values.backend.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.backend.tls.secretName | quote }}
        {{- end }}
        {{- if .Values.nats.tls.enabled }}
        - name: nats-tls
          secret:
            secretName: {{ .Values.nats.tls.secretName | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "perspectivegraph.backendHost" . }}
  labels:
    {{- include "perspectivegraph.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - name: api
      port: {{ .Values.service.apiPort }}
      targetPort: api
    - name: ingest
      port: {{ .Values.service.ingestPort }}
      targetPort: ingest

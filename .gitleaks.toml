# gitleaks configuration.
# Extends the built-in ruleset and allowlists the FAKE example secrets that live
# in test fixtures - they exist only to exercise the secret-scrubber and are not
# real credentials. Everything else is scanned normally.
[extend]
useDefault = true

[allowlist]
description = "Non-real example secrets: scrubber test fixtures + doc/template placeholders"
paths = [
  '''backend/internal/scrub/scrub_test.go''',
  '''backend/testdata/.*''',
]
# Obvious fill-me-in placeholders in templates (e.g. .env.production.example). Only the
# placeholder token is allowlisted, so a real secret pasted anywhere is still caught.
regexes = [
  '''REPLACE_WITH_[A-Z0-9_]+''',
]

# PerspectiveGraph stack.
#
#   docker compose up -d                          # infra only (Postgres+AGE, NATS)
#   docker compose --profile app up -d --build    # full stack incl. backend + dashboard
#   docker compose --profile app --profile search up -d --build   # + OpenSearch
#
# Infra ports bind to 127.0.0.1 (loopback only) so a laptop demo never exposes
# Postgres/NATS/OpenSearch to the LAN. Every service drops new privileges; the
# backend additionally runs read-only, non-root and with all capabilities
# dropped (it's a static binary that writes nothing to disk).

# Shared hardening applied to every service.
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  # ── Graph core: PostgreSQL with the Apache AGE extension ────────────
  postgres:
    <<: *hardening
    # Pinned by digest for reproducible, tamper-evident pulls.
    image: apache/age:release_PG16_1.6.0@sha256:16aa423d20a31aed36a3313244bf7aa00731325862f20ed584510e381f2feaed
    container_name: perspective-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perspective}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perspective}
      POSTGRES_DB: ${POSTGRES_DB:-perspectivegraph}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - perspective-pgdata:/var/lib/postgresql/data
      # Runs once on first boot to create + load the AGE graph.
      - ./deploy/postgres/init-age.sql:/docker-entrypoint-initdb.d/init-age.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-perspective} -d ${POSTGRES_DB:-perspectivegraph}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Event bus: NATS JetStream ───────────────────────────────────────
  nats:
    <<: *hardening
    image: nats:2.12.11-alpine@sha256:006a95e54643c0a2a33dfcee4654e9115f7540ebb8804822d3e2d82bf8515f61
    container_name: perspective-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"   # client
      - "127.0.0.1:8222:8222"   # monitoring
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: make the governance volume writable by the non-root backend (uid 65532),
  # so file-backed persistence (VALIDATIONS_PATH etc.) survives restarts. Exits at once.
  gov-init:
    image: busybox:1.37
    command: ["sh", "-c", "mkdir -p /govdata && chown -R 65532:65532 /govdata"]
    volumes:
      - perspective-govdata:/govdata
    restart: "no"
    profiles: ["app"]

  # ── Backend: ingestion + normalization + analyzer + GraphQL API ─────
  backend:
    <<: *hardening
    build:
      context: ./backend
    image: perspectivegraph-backend:local
    container_name: perspective-backend
    # Hardened runtime: non-root (distroless), immutable rootfs, no caps.
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    volumes:
      - perspective-govdata:/var/lib/perspectivegraph
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      gov-init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-perspective}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perspective}
      POSTGRES_DB: ${POSTGRES_DB:-perspectivegraph}
      # The bundled Postgres has no TLS, so the demo uses sslmode=disable. Point
      # this at a managed/external DB and set "require" (encrypt) or "verify-full"
      # (encrypt + verify cert) - the connection carries the attack map.
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-perspective}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # NATS transport security (off by default). For a TLS-enabled NATS use a
      # tls:// NATS_URL and, for a private CA / mutual TLS, mount the PEMs and point
      # these at them. In a service mesh leave them empty (the mesh wraps it).
      NATS_TLS_CA: ${NATS_TLS_CA:-}
      NATS_TLS_CERT: ${NATS_TLS_CERT:-}
      NATS_TLS_KEY: ${NATS_TLS_KEY:-}
      API_ADDR: ":8080"
      INGEST_ADDR: ":8081"
      # In-app TLS for the API + ingest servers. Empty (default) → plain HTTP,
      # expecting TLS to terminate at the dashboard/ingress in front. To serve HTTPS
      # directly, mount a cert+key (read-only volume) and point these at them.
      TLS_CERT_FILE: ${TLS_CERT_FILE:-}
      TLS_KEY_FILE: ${TLS_KEY_FILE:-}
      ANALYZER_INTERVAL: ${ANALYZER_INTERVAL:-30s}
      ANALYZER_MAX_HOPS: ${ANALYZER_MAX_HOPS:-12}
      # Opt-in: compute critical paths in the DB (AGE Cypher) instead of the
      # default in-process Dijkstra. Off by default (variable-length enumeration
      # is unbounded in the worst case; safe-rails: statement_timeout + LIMIT).
      ANALYZER_DB_PATHS: ${ANALYZER_DB_PATHS:-false}
      # Scale knobs: per-seed pathfinding parallelism (0 = auto = CPUs; result is
      # identical) and incremental snapshotting (patch a resident graph with the
      # per-pass delta instead of re-reading it all - off by default).
      ANALYZER_WORKERS: ${ANALYZER_WORKERS:-0}
      ANALYZER_INCREMENTAL: ${ANALYZER_INCREMENTAL:-false}
      # Attacker-profile mixture priors (commodity/criminal/apt); empty = defaults.
      ATTACKER_PROFILE_PRIORS: ${ATTACKER_PROFILE_PRIORS:-}
      # EPSS -> conditional-traversal exponent p=EPSS^gamma; gamma<1 lifts, empty/1 = as-is.
      EPSS_TRAVERSAL_GAMMA: ${EPSS_TRAVERSAL_GAMMA:-}
      # Opt-in credential-origin seeds (IAM users as leakable-credential seeds); off = internet-origin only.
      SEED_IAM_USERS: ${SEED_IAM_USERS:-false}
      # Staleness pruning: nodes/edges not re-observed within GRAPH_TTL are
      # removed (leader-only) so departed assets can't produce phantom paths.
      # Empty/0 disables it (the default).
      GRAPH_TTL: ${GRAPH_TTL:-}
      # Set to http://opensearch:9200 when running with --profile search.
      OPENSEARCH_URL: ${OPENSEARCH_URL:-}
      THREATINTEL: ${THREATINTEL:-off}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Auth (optional) - pass through when set; open with a loud warning otherwise.
      INGEST_HMAC_SECRET: ${INGEST_HMAC_SECRET:-}
      API_TOKENS: ${API_TOKENS:-}
      # Triage/suppression persistence (optional). Empty → in-memory only. To
      # persist, point this at a path on a writable volume (the backend rootfs is
      # read-only) and mount one, e.g. a named volume at /var/lib/perspectivegraph.
      SUPPRESSIONS_PATH: ${SUPPRESSIONS_PATH:-}
      # Temporal history persistence (path age / MTTR / trend). Same volume note
      # as above. Empty → in-memory only (resets on restart).
      HISTORY_PATH: ${HISTORY_PATH:-}
      # Remediation ticketing: local board persistence + optional dispatch to an
      # external tracker. Same writable-volume note for TICKETS_PATH.
      TICKETS_PATH: ${TICKETS_PATH:-}
      TICKET_WEBHOOK_URL: ${TICKET_WEBHOOK_URL:-}
      # Red-team / BAS validation verdicts + probability calibration. Defaults ON here
      # (the perspective-govdata volume), so a calibration program's verdicts accumulate
      # across restarts. Set VALIDATIONS_PATH= to disable (back to in-memory).
      VALIDATIONS_PATH: ${VALIDATIONS_PATH:-/var/lib/perspectivegraph/validations.json}
      # Tamper-evident audit log (writes AND reads of the attack map). Empty →
      # disabled. The rootfs is read-only; /tmp is a tmpfs, or mount a volume for
      # durability. Verify the hash chain with: perspectivegraph verify-audit <path>
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-}
      # At-rest encryption + export signing (security hardening). Empty → plaintext
      # on disk / unsigned exports.
      STORE_ENCRYPTION_KEY: ${STORE_ENCRYPTION_KEY:-}
      EXPORT_SIGNING_KEY: ${EXPORT_SIGNING_KEY:-}
      # Data hygiene: redact secret-looking values out of scanner output before the
      # store (default on).
      SCRUB_INGEST: ${SCRUB_INGEST:-true}
      # OIDC login (SSO) - validation (jwks/iss/aud) + the SPA-facing coordinates
      # the dashboard login gate uses for the Authorization-Code + PKCE flow.
      OIDC_JWKS_URL: ${OIDC_JWKS_URL:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_AUTHORIZE_URL: ${OIDC_AUTHORIZE_URL:-}
      OIDC_TOKEN_URL: ${OIDC_TOKEN_URL:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
      # IdP end-session endpoint → "Sign out" does an RP-initiated logout (ends the
      # IdP session too, not just the local token).
      OIDC_LOGOUT_URL: ${OIDC_LOGOUT_URL:-}
      # Agentless connectors (PULL ingestion). Empty CONNECTORS_ENABLED → none.
      CONNECTORS_ENABLED: ${CONNECTORS_ENABLED:-}
      CONNECTOR_INTERVAL: ${CONNECTOR_INTERVAL:-15m}
      CONNECTOR_TIMEOUT: ${CONNECTOR_TIMEOUT:-2m}
      CONNECTOR_TENANT: ${CONNECTOR_TENANT:-}
      AWS_CONNECTOR_MODE: ${AWS_CONNECTOR_MODE:-fixtures}
      AWS_FIXTURES_DIR: ${AWS_FIXTURES_DIR:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ROLE_ARN: ${AWS_ROLE_ARN:-}
      AZURE_CONNECTOR_MODE: ${AZURE_CONNECTOR_MODE:-fixtures}
      AZURE_FIXTURES_DIR: ${AZURE_FIXTURES_DIR:-}
      # Dev workflow (GitHub): PR comment + merge-gate status + remediation-as-PR.
      # Empty token → dry-run (logged, not posted).
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_DRY_RUN: ${GITHUB_DRY_RUN:-false}
      DASHBOARD_URL: ${DASHBOARD_URL:-}
      # AI-native layer. Anthropic (Claude) is preferred; HuggingFace (HF_TOKEN,
      # OpenAI-compatible) is the free fallback used when no Anthropic key is set.
      # Empty for both → /ai/* disabled (self-gated).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_MODEL: ${HF_MODEL:-}
      HF_BASE_URL: ${HF_BASE_URL:-}
    ports:
      - "127.0.0.1:8080:8080"   # GraphQL API / BFF
      - "127.0.0.1:8081:8081"   # ingestion webhooks (for `make seed`)
    profiles: ["app"]

  # ── Frontend: React dashboard served by nginx (proxies /graphql) ────
  frontend:
    <<: *hardening
    build:
      context: ./frontend
    image: perspectivegraph-dashboard:local
    container_name: perspective-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:80"
    profiles: ["app"]

  # ── Optional full-text index: OpenSearch ────────────────────────────
  opensearch:
    <<: *hardening
    image: opensearchproject/opensearch:3.7.0@sha256:123e6591a47b1d54686890551bdb35739c85193ecded381219fc9e059e18128f
    container_name: perspective-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
    ports:
      - "127.0.0.1:9200:9200"
    profiles: ["search"]   # opt-in: `docker compose --profile search up`

  # ── Optional local OIDC IdP for trying SSO login (Keycloak) ─────────
  # Opt-in demo identity provider so you can exercise the dashboard's SSO login
  # gate end-to-end on a laptop, no cloud IdP needed:
  #   docker compose --profile app --profile sso up -d
  # then set the backend OIDC_* env (see the README SSO section / the realm file) and open
  # http://localhost:3000. Realm "demo", user demo/demo, client perspectivegraph.
  # Dev image/flags (start-dev, in-memory) - for local testing only, not production.
  keycloak:
    <<: *hardening
    image: quay.io/keycloak/keycloak:26.4
    container_name: perspective-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./deploy/keycloak/realm-demo.json:/opt/keycloak/data/import/realm-demo.json:ro
    ports:
      - "127.0.0.1:8088:8080"   # IdP - browser-facing issuer http://localhost:8088
    profiles: ["sso"]

volumes:
  perspective-pgdata:
  # Persists the file-backed governance stores (validations/calibration, suppressions,
  # history, tickets, audit log) across restarts. gov-init fixes its ownership so the
  # non-root, read-only-rootfs backend can actually write it.
  perspective-govdata:
